name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  id-token: write # npm provenance

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/oddly-even/kravla
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  npm:
    runs-on: ubuntu-latest
    # Auth is npm Trusted Publishing (OIDC) — no token, no secret. Gated off
    # until the trusted publisher is configured on npmjs (package settings).
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # No registry-url here: setup-node's registry-url writes an .npmrc
      # auth stanza + exports a placeholder NODE_AUTH_TOKEN, which makes npm
      # prefer token auth over OIDC trusted publishing (publish then 404s).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # OIDC trusted publishing needs npm >= 11.5.1; node 22 ships an older one.
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      # Prereleases (0.1.0-alpha.N) land on the `next` dist-tag; stable on `latest`.
      - name: Publish @oddly-even/kravla
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then TAG=next; else TAG=latest; fi
          npm publish --provenance --access public --tag "$TAG"
