name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Build first: the service package resolves @oddly-even/kravla types
      # from packages/core/dist via the exports map.
      - run: bun run build
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test
